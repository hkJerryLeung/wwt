<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <!-- 🔑 FOUC 防閃爍：在任何 CSS/JS 載入前同步套用 accent color -->
  <script>
    ; (function () {
      try {
        var raw = localStorage.getItem('wwt-appearance')
        if (raw) {
          var parsed = JSON.parse(raw)
          if (parsed.accentColor) {
            var s = document.documentElement.style
            s.setProperty('--color-bp-accent', parsed.accentColor)
            // brighten ~1.3x for accent-bright
            var m = parsed.accentColor.replace(/^#/, '').match(/.{2}/g)
            if (m && m.length === 3) {
              var r = Math.min(255, Math.round(parseInt(m[0], 16) * 1.3))
              var g = Math.min(255, Math.round(parseInt(m[1], 16) * 1.3))
              var b = Math.min(255, Math.round(parseInt(m[2], 16) * 1.3))
              s.setProperty('--color-bp-accent-bright',
                '#' + ('0' + r.toString(16)).slice(-2) + ('0' + g.toString(16)).slice(-2) + ('0' + b.toString(16)).slice(-2))
            }
          }
        }
      } catch (e) { }
    })()
  </script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" />
  <title></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- 預載主要字型，加速載入避免 FOUT -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600;700&display=block"
    as="style" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600;700&display=block"
    rel="stylesheet" />
</head>

<body class="bg-bp-primary text-white antialiased">
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
